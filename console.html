<!DOCTYPE html>
<html lang="en" class="h-full bg-[#020617]">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="h-full text-slate-300 font-mono">

    <div class="min-h-full flex items-center justify-center p-6">
        <!-- Login Card -->
        <div class="glass w-full max-w-md border border-slate-800 p-10">
            <div class="mb-10 text-center">
                <h1 class="text-2xl font-bold text-white tracking-[0.2em]">LOGOS CONSOLE</h1>
                <span class="text-[10px] text-cyan-500 uppercase tracking-[0.3em]">Institutional Access Only</span>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest mb-2">Agent ID</label>
                    <input type="text" class="w-full bg-slate-950 border border-slate-700 p-3 text-white focus:border-cyan-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase tracking-widest mb-2">Biometric Hash / Key</label>
                    <input type="password" class="w-full bg-slate-950 border border-slate-700 p-3 text-white focus:border-cyan-500 outline-none transition">
                </div>

                <button class="w-full bg-cyan-600 py-4 font-bold text-white hover:bg-cyan-500 transition uppercase tracking-widest text-sm">
                    Initialize Access
                </button>
            </form>

            <div class="mt-8 text-center text-[9px] text-slate-600 uppercase tracking-widest">
                System: REALAiiD Sovereign Mesh<br>
                Status: Secure Handshake Required
            </div>
        </div>
    </div>

</body>
</html>
