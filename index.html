<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-img { height: 100vh; width: 100%; object-fit: cover; }
        .glass-nav { background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#020617] text-white font-sans">

    <!-- Navigation Overlay -->
    <nav class="glass-nav fixed top-0 z-50 w-full px-12 py-8 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-[0.2em]">AIM MOTORS 
            <span class="text-[10px] text-cyan-500 block uppercase tracking-[0.4em]">Sovereign Autonomous Intelligence</span>
        </div>
        <div class="space-x-12 text-sm font-medium uppercase tracking-widest">
            <a href="#" class="hover:text-cyan-400">Inventory</a>
            <a href="#" class="hover:text-cyan-400">Terra Twin</a>
            <a href="#" class="bg-yellow-600/20 border border-yellow-600 px-6 py-3 hover:bg-yellow-600/40">Logos Console</a>
        </div>
    </nav>

    <!-- Hero Section: Full Browser Takeover -->
    <section id="hero" class="relative h-screen w-full overflow-hidden">
        <!-- You can cycle these via JS, or keep as a single striking PNG -->
        <img src="hero_assembly_line.png" class="hero-img" alt="Production Line">
    </section>

    <!-- Content Sections (Appears on Scroll) -->
    <main class="relative z-10 bg-[#020617]">
        <section class="py-24 px-12 text-center">
            <h2 class="text-4xl font-bold mb-6">Sovereign Hardware Architecture</h2>
            <p class="max-w-3xl mx-auto text-slate-400">Built for the REALAiiD Bureau. Secure, autonomous, and energy-generative.</p>
        </section>
    </main>

    <footer class="py-12 border-t border-slate-800 text-center text-[10px] uppercase tracking-widest text-slate-600">
        &copy; 2026 Solomon Kin LLC. All Rights Reserved.
    </footer>

</body>
</html>
